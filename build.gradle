plugins {
    id 'application'
}

group = 'tndmadman'
version = '0.3.0-kokoro-tts'

repositories {
    mavenCentral()
}

sourceSets.main.java.srcDirs = ['src']

application {
    mainClass = 'redditTxtToImg.RedditScreenshotGenerator'
}

jar {
    archiveBaseName = 'ThreadGens'
    manifest {
        attributes 'Main-Class': 'redditTxtToImg.RedditScreenshotGenerator'
    }
}
